name: Package Release

on:
  release:
    types: [published]

jobs:
  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "Matched-Betting-Manager" --icon=icon.ico main.py
        continue-on-error: true
      
      - name: Build EXE (without icon if not exists)
        if: failure()
        run: |
          pyinstaller --onefile --windowed --name "Matched-Betting-Manager" main.py
      
      - name: Upload EXE to release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/Matched-Betting-Manager.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          sudo apt-get update
          sudo apt-get install -y fpm
      
      - name: Build executable
        run: |
          pyinstaller --onefile --windowed --name matched-betting-manager main.py
      
      - name: Create DEB package
        run: |
          mkdir -p build/usr/bin build/usr/share/applications
          cp dist/matched-betting-manager build/usr/bin/
          
          # Create desktop entry
          cat > build/usr/share/applications/matched-betting-manager.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Matched Betting Manager
          Exec=/usr/bin/matched-betting-manager
          Icon=matched-betting-manager
          Categories=Application;Finance;
          Terminal=false
          EOF
          
          fpm -s dir -t deb \
            -n matched-betting-manager \
            -v ${GITHUB_REF#refs/tags/} \
            -C build \
            --maintainer "$(git log -1 --pretty=%an)" \
            --description "A local PySide6 desktop app for matched betting management" \
            -a x86_64 \
            .
      
      - name: Upload DEB to release
        uses: softprops/action-gh-release@v1
        with:
          files: matched-betting-manager*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
